name: Deploy VPS

on:
  push:
    branches:
      - deploy
  workflow_dispatch:
    inputs:
      run_import:
        description: "Rodar importacao Fatec depois do deploy"
        required: true
        default: false
        type: boolean

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$VPS_HOST" ]; then
            echo "::error::Secret VPS_HOST nao foi configurado."
            exit 1
          fi

          if [ -z "$VPS_PORT" ]; then
            echo "::error::Secret VPS_PORT esta vazio. Use 22 ou a porta SSH da sua VPS."
            exit 1
          fi

          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Secret VPS_SSH_KEY nao foi configurado."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/$VPS_HOST/$VPS_PORT"; then
            echo "::error::Nao consegui acessar $VPS_HOST na porta SSH $VPS_PORT. Confira VPS_HOST, VPS_PORT e firewall/security group da VPS."
            exit 1
          fi

          if ! ssh-keyscan -T 20 -H -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts; then
            echo "::error::ssh-keyscan falhou. Confira se a porta $VPS_PORT e mesmo SSH e se a VPS aceita conexoes externas."
            exit 1
          fi

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'fatec' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'fatec_study' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          RUN_IMPORT: ${{ github.event_name == 'workflow_dispatch' && inputs.run_import || false }}
        run: |
          set -euo pipefail

          if [ -z "$VPS_USER" ]; then
            echo "::error::Secret VPS_USER nao foi configurado."
            exit 1
          fi

          if [ -z "$VPS_APP_DIR" ]; then
            echo "::error::Secret VPS_APP_DIR nao foi configurado."
            exit 1
          fi

          ENV_FILE="$(mktemp)"
          trap 'rm -f "$ENV_FILE"' EXIT
          DATABASE_URL_VALUE="${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public}"

          cat > "$ENV_FILE" <<ENV
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          DATABASE_URL=${DATABASE_URL_VALUE}
          GEMINI_API_KEY=${GEMINI_API_KEY}
          CORS_ORIGIN=${CORS_ORIGIN}
          ENV

          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_APP_DIR' && git fetch origin main && git reset --hard origin/main && mkdir -p provas"

          scp -i ~/.ssh/deploy_key -P "$VPS_PORT" "$ENV_FILE" "$VPS_USER@$VPS_HOST:$VPS_APP_DIR/.env"

          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_APP_DIR' && docker compose up --build -d && docker compose exec -T api npm run prisma:deploy -w @fatec-study/api"

          if [ "$RUN_IMPORT" = "true" ]; then
            ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
              "cd '$VPS_APP_DIR' && docker compose exec -T api npm run import:fatec:prod -w @fatec-study/api"
          fi

          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "cd '$VPS_APP_DIR' && docker compose ps"
