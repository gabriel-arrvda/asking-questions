name: Deploy VPS

on:
  push:
    branches:
      - deploy
  workflow_dispatch:
    inputs:
      run_import:
        description: "Rodar importacao Fatec depois do deploy"
        required: true
        default: false
        type: boolean

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: verify
    environment: production
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$VPS_PORT" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER || 'fatec' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB || 'fatec_study' }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          RUN_IMPORT: ${{ github.event_name == 'workflow_dispatch' && inputs.run_import || false }}
        run: |
          ssh -i ~/.ssh/deploy_key -p "$VPS_PORT" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$VPS_APP_DIR' \
             POSTGRES_USER='$POSTGRES_USER' \
             POSTGRES_PASSWORD='$POSTGRES_PASSWORD' \
             POSTGRES_DB='$POSTGRES_DB' \
             GEMINI_API_KEY='$GEMINI_API_KEY' \
             CORS_ORIGIN='$CORS_ORIGIN' \
             RUN_IMPORT='$RUN_IMPORT' bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$APP_DIR"
          git fetch origin main
          git reset --hard origin/main

          cat > .env <<ENV
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
          GEMINI_API_KEY=${GEMINI_API_KEY}
          CORS_ORIGIN=${CORS_ORIGIN}
          ENV

          mkdir -p provas

          docker compose up --build -d
          docker compose exec -T api npm run prisma:deploy -w @fatec-study/api

          if [ "$RUN_IMPORT" = "true" ]; then
            docker compose exec -T api npm run import:fatec:prod -w @fatec-study/api
          fi

          docker compose ps
          REMOTE
