services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fatec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fatec}
      POSTGRES_DB: ${POSTGRES_DB:-fatec_study}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://fatec:fatec@postgres:5432/fatec_study?schema=public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/apps/api/uploads
      - ./provas:/app/provas:ro

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres-data:
  uploads:
